<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Expense Splitter</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #2c5364);
    min-height: 100vh;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 900px;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(90deg, blue, orange, red, green);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

input, button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

input {
    width: 60%;
}

button {
    cursor: pointer;
    background: linear-gradient(45deg, blue, orange);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, red, green);
}

.friend-list, .expense-list, .result {
    margin-top: 20px;
    padding: 10px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
}

.friend {
    display: inline-block;
    padding: 5px 10px;
    margin: 5px;
    border-radius: 10px;
    background: linear-gradient(45deg, blue, green);
    animation: pop 0.4s ease;
}

.checkbox-group {
    display: flex;
    flex-wrap: wrap;
}

.checkbox-group label {
    margin: 5px;
}

.result-box {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    background: linear-gradient(45deg, red, orange);
    animation: slideUp 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

@keyframes slideUp {
    from {transform: translateY(20px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Trip Expense Splitter</h1>

    <!-- Add Friend -->
    <input type="text" id="friendName" placeholder="Enter friend name">
    <button onclick="addFriend()">Add Friend</button>

    <div class="friend-list" id="friendList"></div>

    <!-- Add Expense -->
    <h3>Add Expense</h3>
    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="paidBy" placeholder="Paid By (name)">
    
    <div class="checkbox-group" id="splitGroup"></div>

    <button onclick="addExpense()">Add Expense</button>

    <div class="expense-list" id="expenseList"></div>

    <button onclick="calculate()">Calculate Split</button>

    <div class="result" id="result"></div>
</div>

<script>
let friends = [];
let expenses = [];

function addFriend() {
    let name = document.getElementById("friendName").value.trim();
    if (!name || friends.includes(name)) return;

    friends.push(name);
    document.getElementById("friendName").value = "";

    renderFriends();
}

function renderFriends() {
    let list = document.getElementById("friendList");
    let splitGroup = document.getElementById("splitGroup");

    list.innerHTML = "";
    splitGroup.innerHTML = "";

    friends.forEach(friend => {
        list.innerHTML += `<span class="friend">${friend}</span>`;

        splitGroup.innerHTML += `
            <label>
                <input type="checkbox" value="${friend}"> ${friend}
            </label>
        `;
    });
}

function addExpense() {
    let amount = parseFloat(document.getElementById("amount").value);
    let paidBy = document.getElementById("paidBy").value.trim();

    let selected = [...document.querySelectorAll("#splitGroup input:checked")]
                    .map(cb => cb.value);

    if (!amount || !paidBy || selected.length === 0) return;

    expenses.push({ amount, paidBy, splitBetween: selected });

    document.getElementById("amount").value = "";
    document.getElementById("paidBy").value = "";
    document.querySelectorAll("#splitGroup input").forEach(cb => cb.checked = false);

    renderExpenses();
}

function renderExpenses() {
    let list = document.getElementById("expenseList");
    list.innerHTML = "";

    expenses.forEach(exp => {
        list.innerHTML += `
            <div>
                ?${exp.amount} paid by <b>${exp.paidBy}</b> split between ${exp.splitBetween.join(", ")}
            </div>
        `;
    });
}

function calculate() {
    let balance = {};

    friends.forEach(f => balance[f] = 0);

    expenses.forEach(exp => {
        let share = exp.amount / exp.splitBetween.length;

        exp.splitBetween.forEach(p => {
            balance[p] -= share;
        });

        balance[exp.paidBy] += exp.amount;
    });

    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";

    for (let person in balance) {
        let amount = balance[person].toFixed(2);
        resultDiv.innerHTML += `
            <div class="result-box">
                ${person}: ?${amount}
            </div>
        `;
    }
}
</script>

</body>
</html>
